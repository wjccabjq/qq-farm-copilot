name: Build And Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        type: string
      ref:
        description: 'Git ref/branch/commit to build from (optional, default current ref)'
        required: false
        type: string

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $target = '${{ github.sha }}'
          } else {
            $tag = '${{ inputs.tag }}'.Trim()
            if (-not $tag) {
              throw 'workflow_dispatch must provide a non-empty "tag" input.'
            }
            $target = '${{ inputs.ref }}'.Trim()
            if (-not $target) {
              $target = '${{ github.sha }}'
            }
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "target=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Release tag: $tag"
          Write-Host "Target ref: $target"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean build.spec

      - name: Prepare package asset
        id: package
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $src = 'dist/QQFarmCopilot.exe'
          $asset = "QQFarmCopilot-$tag-windows-x64.zip"
          $stageDir = Join-Path $PWD '_release_stage'
          $stagedExe = Join-Path $stageDir 'QQFarmCopilot.exe'
          if (-not (Test-Path $src)) {
            throw "Build output not found: $src"
          }
          if (Test-Path $stageDir) {
            Remove-Item -LiteralPath $stageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stageDir | Out-Null
          Copy-Item -LiteralPath $src -Destination $stagedExe
          if (Test-Path $asset) {
            Remove-Item -LiteralPath $asset -Force
          }
          Compress-Archive -Path $stagedExe -DestinationPath $asset -Force
          Remove-Item -LiteralPath $stageDir -Recurse -Force
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Package: $asset"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQFarmCopilot-${{ steps.meta.outputs.tag }}-windows-x64
          path: ${{ steps.package.outputs.asset }}

      - name: Build release notes (include all commits)
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $target = '${{ steps.meta.outputs.target }}'
          $repo = '${{ github.repository }}'

          # 确保本地可见所有 tag，避免浅拉取或手动触发时 tag 不完整
          git fetch --force --tags

          # 计算上一版本 tag（优先按当前 tag 可达历史）
          $prevTag = ''
          $tagRefExists = $false
          try {
            git rev-parse --verify "refs/tags/$tag" *> $null
            if ($LASTEXITCODE -eq 0) {
              $tagRefExists = $true
            }
          } catch {
            $tagRefExists = $false
          }

          if ($tagRefExists) {
            try {
              $prevTag = (git describe --tags --abbrev=0 "$tag^" 2>$null).Trim()
            } catch {
              $prevTag = ''
            }
          }
          if (-not $prevTag) {
            $allTags = @(git tag --sort=-creatordate)
            foreach ($t in $allTags) {
              if ($t -and $t.Trim() -ne $tag) {
                $prevTag = $t.Trim()
                break
              }
            }
          }

          # 先取 GitHub 自动生成说明（通常偏 PR），再追加全量 commits
          # 注意：workflow_dispatch 首次发布时，当前 tag 可能尚未在本地存在。
          # 生成本地 commit 差异时要使用可解析的 toRef（优先 tag，其次 target）。
          $toRef = $target
          if ($tagRefExists) {
            $toRef = $tag
          }

          if ($prevTag) {
            $generated = gh api "repos/$repo/releases/generate-notes" -f tag_name="$tag" -f target_commitish="$target" -f previous_tag_name="$prevTag" | ConvertFrom-Json
            $range = "$prevTag..$toRef"
            $compareUrl = "https://github.com/$repo/compare/$prevTag...$tag"
            if (-not $tagRefExists) {
              $compareUrl = "https://github.com/$repo/compare/$prevTag...$target"
            }
            $rangeTitle = "变更范围: $prevTag -> $toRef"
          } else {
            $generated = gh api "repos/$repo/releases/generate-notes" -f tag_name="$tag" -f target_commitish="$target" | ConvertFrom-Json
            $range = $toRef
            $compareUrl = ''
            $rangeTitle = "变更范围: $toRef"
          }

          $commitLines = git log $range --pretty=format:"- %h %s (%an)" --no-color
          if (-not $commitLines) {
            $commitLines = '- 无提交记录'
          }

          $notesFile = 'release_notes.md'
          $body = @()
          $body += [string]$generated.body
          $body += ''
          $body += '---'
          $body += ''
          $body += '## 全量 Commit 差异'
          $body += $rangeTitle
          if ($compareUrl) {
            $body += "Compare: $compareUrl"
          }
          $body += ''
          $body += $commitLines

          Set-Content -LiteralPath $notesFile -Value ($body -join "`n") -Encoding UTF8
          "notes_file=$notesFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $target = '${{ steps.meta.outputs.target }}'
          $asset = '${{ steps.package.outputs.asset }}'
          $notesFile = '${{ steps.notes.outputs.notes_file }}'

          if (gh release view $tag *> $null) {
            Write-Host "Release already exists, upload asset with overwrite..."
            gh release upload $tag $asset --clobber
            gh release edit $tag --title $tag --notes-file $notesFile --latest
          } else {
            Write-Host "Create new release..."
            gh release create $tag $asset --target $target --title $tag --notes-file $notesFile --latest
          }
